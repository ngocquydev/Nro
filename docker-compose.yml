services:
  # Service MongoDB tách riêng
  mongodb:
    image: mongo:latest
    container_name: mongodb_nro
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # Thay host.docker.internal bằng tên service mongodb
      - MONGO_URI=mongodb://127.0.0.1:27017/GameNro
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - mongodb

  frontend:
    build: ./frontend 
    ports:
      - "3001:5173" 
    env_file:
      - ./.env 
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules 
      - ./.env:/usr/src/app/.env
    stdin_open: true
    tty: true
    command: npm run dev -- --host
    depends_on:
      - backend

# Khai báo volume để lưu dữ liệu database vĩnh viễn
volumes:
  mongo_data: